<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .tabuleiro {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 10px;
        }

        .celula {
            display: flex;
            background-color: blueviolet;
            width: 100px;
            height: 100px;
            justify-content: center;
            align-items: center;
            font-size: 46px;
            cursor: pointer;
            color: rgb(238, 253, 106);
            border: none;
        }
        #botaoReiniciar {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 15px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>Jogo da Velha</h1>
    <div id="tabuleiro-jogo" class="tabuleiro">
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
    </div>
    <button id="botaoReiniciar">Reiniciar Jogo</button>
    <script src="domjs1.js">
    </script>
</body>

</html>
